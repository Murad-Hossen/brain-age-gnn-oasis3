name: Update Leaderboard

on:
  push:
    branches:
      - main
    paths:
      - 'submissions/**' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas tabulate

      - name: Run Leaderboard Script
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
        run: python update_leaderboard.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Add the CSV and Markdown files
          git add leaderboard/leaderboard.csv leaderboard/LEADERBOARD.md
          
          # 2. Add the HTML file from the docs folder (where your script saves it)
          git add docs/leaderboard.html
          
          # 3. Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update leaderboard [skip ci]" && git push)